<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maze of No Loss</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --panel-bg: #161b22;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            max-width: 650px;
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .hud {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .hud span strong {
            color: var(--accent-color);
        }

        .story-text {
            line-height: 1.6;
            margin-bottom: 24px;
            font-size: 1.1rem;
            min-height: 80px;
        }

        .concepts-panel {
            background: rgba(88, 166, 255, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            margin-bottom: 24px;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .choice-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            transform: translateX(4px);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="hud">
        <span>Depth: <strong id="depth-val">1</strong> (<span id="phase-val">Descent</span>)</span>
        <span>Perspective: <strong id="stat-p">1</strong> | Recall: <strong id="stat-r">1</strong></span>
    </div>

    <div id="story" class="story-text"></div>

    <div id="concepts-box" class="concepts-panel hidden">
        <strong>💡 Realization Unlocked:</strong> <span id="concept-text"></span>
    </div>

    <div id="choices" class="choices-container"></div>
</div>

<script>
const player = {
    depth: 1,
    phase: "Descent",
    perspective: 1,
    recall: 1,
    hasPivot: false
};

let typingTimer = null;

// Database of Room Nodes
const maze = {
    1: {
        text: "Depth 1: The Void of First Assumptions. You stand on a plain of pure white light. Three distinct structures frame the path ahead.",
        choices: [
            { text: "Enter the obsidian archway.", target: 2, bonus: { type: 'recall', val: 1 } },
            { text: "Step directly into the column of liquid mercury.", target: 'pivot_room', bonus: null },
            { text: "Pass through the blank gap between them.", target: 2, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    'pivot_room': {
        text: "Depth 2 (Shifted): The uncertainty wraps around you. Instead of failing or resetting, your focus sharpens to look for fundamental patterns. You have lost nothing. You have simply adapted.",
        concepts: "The Observer's Pivot (Failure does not reset you; it alters your coordinates while granting insight).",
        choices: [
            { text: "Integrate this truth and continue downward.", target: 2, bonus: { type: 'pivot', val: true } }
        ]
    },
    2: {
        text: "Depth 2: The Hall of Fractured Mirrors. The walls reflect your past choices. A faint inscription reads: 'The version of you that stumbled taught the version of you standing here.'",
        choices: [
            { text: "Examine your largest reflection.", target: 3, bonus: { type: 'recall', val: 1 } },
            { text: "Step through the rhythm of the unpolished glass.", target: 3, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    3: {
        text: "Depth 3: The Library of Unwritten Laws. Slips of drifting paper hold rules given to you by society or your own anxieties. One reads: 'You must always know the outcome before you try.'",
        choices: [
            { text: "Sit and study the syntax of the papers.", target: 4, bonus: { type: 'recall', val: 1 } },
            { text: "Push directly through a solid wooden bookshelf.", target: 4, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    4: {
        text: "Depth 4: The Monolith of Weightless Matter. Transitioning deeper, the scenery thickens. You stand before a massive boulder suspended over an infinite starless abyss. It bars the path entirely, pulsing with the dense gravity of primal material anxiety. It is too heavy for human muscle, yet it hangs unanchored. To pass, you must interact with something that refuses to acknowledge your physical constraints.",
        choices: [
            { text: "Lean your weight into the stone, challenging its density.", target: 5, bonus: { type: 'recall', val: 1 } },
            { text: "Close your eyes and float upward, attempting to phase directly through it.", target: 'trap_room', bonus: null }
        ]
    },
    'trap_room': {
        text: "The stone rejects your phasing. It feels cold and absolute against your skin, guiding your hands safely to its exterior crevices. The friction doesn't crush you; it shifts your footing. You climb. As you sit upon the summit of the mass that blocked you, you see that the stone is now beneath you—weightless, discarded, and serving as your vessel into the void.",
        choices: [
            { text: "Acknowledge that your friction became your path.", target: 5, bonus: { type: 'perspective', val: 2 } }
        ]
    },
    5: {
        text: "Depth 5: The Threshold of the Engine. You have reached the core mechanism of the system. The white light is blinding now, stripping away your attachment to coordinates, numbers, and individual progress. The walls collapse. To step into true reality, you must carry this light backwards into the world of structures.",
        choices: [
            { text: "Touch the center and accept your Ascent.", target: 6, phaseChange: "Ascent" }
        ]
    },
    6: {
        text: "Ascending... You trace your steps out, but the corridor morphs into a flashing, chaotic gambling engine. Neon screens offer minor numbers and endless, safe validation loops designed to capture your attention and stall your return.",
        getDynamicChoices: function() {
            let options = [];
            // Option 1: Always available blind option
            options.push({ text: "Engage with the blinking loops.", target: 'loop_trap', hint: "A blind step forward." });
            
            // Insight options only reveal their true nature if conditions are met
            if (player.hasPivot) {
                options.push({ text: "Utilize your Observer's Pivot on the machines.", target: 7, hint: "Insight Active: Slingshot past the machine's parameters." });
            } else {
                options.push({ text: "Search for an alternative output path.", target: 7, hint: "A blind step forward." });
            }
            return options;
        }
    },
    'loop_trap': {
        text: "The loop captures your attention. In an ordinary system, this is an addictive trap. Here, experiencing the loop firsthand provides clean spatial data. You map the boundaries of the distraction.",
        choices: [
            { text: "Use the new data to bypass the machine.", target: 7, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    7: {
        text: "The final boundary. You stand at the exit, looking out at everyday life. An inscription asks: 'You return to a world that lives in fear of loss. How will you show them this maze?'",
        choices: [
            { text: "By constructing a hidden loop of choices for them to play.", target: 1, reset: true },
            { text: "By living without attachments so your quietude acts as a question.", target: 1, reset: true }
        ]
    }
};

function typeWriter(text, elementId, speed, callback) {
    let i = 0;
    const element = document.getElementById(elementId);
    element.textContent = "";
    
    clearInterval(typingTimer);
    
    typingTimer = setInterval(() => {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
        } else {
            clearInterval(typingTimer);
            if (callback) callback();
        }
    }, speed);
}

function renderGame() {
    const currentRoom = maze[player.depth];
    
    // Update HUD
    document.getElementById("depth-val").textContent = typeof player.depth === 'number' ? player.depth : "Transition";
    document.getElementById("phase-val").textContent = player.phase;
    document.getElementById("stat-p").textContent = player.perspective;
    document.getElementById("stat-r").textContent = player.recall;

    // Clear old choices during typing
