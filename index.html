<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Maze of No Loss</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .game-container { 
            max-width: 650px; 
            width: 100%; 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 6px; 
            padding: 24px; 
            box-shadow: 0 8px 24px 
                rgba(0,0,0,0.5); 
            box-sizing: border-box; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        .hud { 
            display: flex; 
            justify-content: 
                space-between; 
            border-bottom: 1px 
                solid #30363d; 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
            font-size: 0.9rem; 
            color: #8b949e; 
        }
        .hud strong { color: #58a6ff; }
        .story-text { 
            line-height: 1.6; 
            margin-bottom: 24px; 
            font-size: 1.1rem; 
            height: auto; 
        }
        .concepts-panel { 
            background: 
                rgba(88,166,255,0.1); 
            border-left: 4px 
                solid #58a6ff; 
            padding: 12px; 
            margin-bottom: 24px; 
            font-size: 0.95rem; 
        }
        .choices-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .choice-btn { 
            background: #21262d; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 12px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem; 
            white-space: normal; 
            word-wrap: break-word; 
            opacity: 0; 
            animation: fadeIn 0.3s 
                forwards; 
            transition: all 0.2s; 
        }
        .choice-btn:hover { 
            background: #30363d; 
            transform: translateX(4px); 
        }
        .input-container { 
            margin-top: 20px; 
            border-top: 1px 
                dashed #30363d; 
            padding-top: 20px; 
            display: flex; 
            gap: 10px; 
            opacity: 0; 
            animation: fadeIn 0.3s 
                forwards; 
        }
        .text-input { 
            flex-grow: 1; 
            background: #0d1117; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 1rem; 
        }
        .text-input:focus { 
            border-color: #58a6ff; 
            outline: none; 
        }
        .submit-btn { 
            background: #21262d; 
            color: #58a6ff; 
            border: 1px solid #30363d; 
            padding: 10px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem; 
        }
        .submit-btn:hover { 
            background: #30363d; 
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .hidden { display: none !important; }

        /* MATRIX HIJACK CLASSES */
        .hijack-active {
            background: #000000 !important;
            border-color: #00ff00 !important;
            color: #00ff00 !important;
            font-family: monospace !important;
        }
        .hijack-text {
            color: #00ff00 !important;
            font-family: monospace !important;
            line-height: 1.6;
        }
        .hijack-alert {
            color: #ff3333 !important;
            font-weight: bold;
            margin-top: 10px;
        }
        .hijack-success {
            color: #ffffff !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="container-box" class="game-container">
    <div id="hud-box" class="hud">
        <span>Depth: <strong id="depth-val">1</strong> (<span id="phase-val">Descent</span>)</span>
        <span>Perspective: <strong id="stat-p">1</strong> | Recall: <strong id="stat-r">1</strong></span>
    </div>
    <div id="story" class="story-text"></div>
    <div id="concepts-box" class="concepts-panel hidden">
        <strong>💡 Realization:</strong> 
        <span id="concept-text"></span>
    </div>
    <div id="choices" class="choices-container"></div>
    <div id="custom-input-box" class="input-container hidden">
        <input type="text" id="user-thought" class="text-input" placeholder="Type text...">
        <button id="submit-thought" class="submit-btn">Offer</button>
    </div>
</div>
<script>
// --- GLOBAL CORE STATE VARIABLES ---
const player = { 
    depth: 1, 
    phase: "Descent", 
    perspective: 1, 
    recall: 1, 
    hasPivot: false 
};
let typingTimer = null;
let currentRoomId = 1;

// --- DYNAMIC DICTIONARY INTERACTIVE MAP ---
const maze = {  
    1: { 
        text: "Depth 1: The Void of First Assumptions. You stand on a plain of pure white light. Three distinct structures frame the path ahead. There are no signs, only the shapes of your intentions.", 
        choices: [
            { text: "Enter the obsidian archway.", target: 2, bonus: { type: 'recall', val: 1 } }, 
            { text: "Step into the liquid mercury.", target: 'pivot_room', bonus: null }, 
            { text: "Pass through the blank gap.", target: 2, bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    'pivot_room': { 
        text: "Depth 2 (Shifted): The uncertainty wraps around you. Instead of failing or resetting, your focus sharpens to look for fundamental patterns. You have lost nothing. You have simply adapted.", 
        concepts: "The Observer's Pivot (Failure alters coordinates).", 
        choices: [{ text: "Integrate this truth and continue downward.", target: 2, bonus: { type: 'pivot', val: true } }] 
    },
    2: { 
        text: "Depth 2: The Hall of Fractured Mirrors. The walls reflect your past choices. A faint inscription reads: 'The version of you that stumbled taught the version of you standing here.'", 
        choices: [
            { text: "Examine your largest reflection.", target: 3, bonus: { type: 'recall', val: 1 } }, 
            { text: "Step through the glass rhythm.", target: 3, bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    3: { 
        text: "Depth 3: The Library of Unwritten Laws. Slips of drifting paper hold rules given to you by society. One reads: 'You must always know the outcome before you try.'", 
        choices: [
            { text: "Sit and study the papers.", target: 4, bonus: { type: 'recall', val: 1 } }, 
            { text: "Push through a solid bookshelf.", target: 4, bonus: { type: 'perspective', val: 1 } }
        ] 
    },
       4: { 
        text: "Depth 4: The Monolith of Weightless Matter. The fantasy scenery glitches out violently, revealing the raw web grid layers. A dense, uncompiled data block bars the viewport entirely, floating over a starless digital abyss. It reads your raw input history in real-time, flashing a direct runtime alert: 'The human mind reading this line is carrying too much external friction to compile the next depth level.' You are facing an architecture that isn't testing your in-game avatar—it is testing the physical constraints of the person sitting at the keyboard.", 
        choices: [
            { text: "Lean your physical weight into the monitor console.", target: 5, bonus: { type: 'recall', val: 1 } }, 
            { text: "Attempt to phase through the code strings.", target: 'trap_room', bonus: null }
        ] 
    },
    'trap_room': { 
        text: "The structural source code blocks reject your input. The screen flashes an operational override down your stack.",
        choices: [{ text: "Realign your focus parameters.", target: 4, bonus: null }]
    },
    5: {
        text: "Depth 5: The Threshold of Expression. The outer structures have completely dissolved. Before you lies a shimmering bridge of raw code strings. To advance, you must prepare to project your own parameters into the grid architecture.",
        choices: [{ text: "Cross the code bridge into the deeper layers.", target: 6, bonus: { type: 'perspective', val: 1 } }]
    },
    6: {
        text: "Depth 6: The Chamber of Echoes. Your thoughts reverberate off invisible layout surfaces. The simulation is beginning to mirror your internal processing frequency, thinning out the background noise. A prompt blinks in the margin: 'Are you observing the data, or is the data compiling you?'",
        choices: [
            { text: "Stand still and listen to the trailing resonance of your past choices.", target: 7, bonus: { type: 'recall', val: 1 } },
            { text: "Shout directly into the layout void to test the system boundaries.", target: 7, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    7: {
        text: "Depth 7: The Lattice of Connections. Glowing fiber lines stretch across the dark viewport, mimicking a massive neural network. You realize this data stream isn't random environment filler—it is actively tracking your real-world key retention history.",
        choices: [
            { text: "Trace a single glowing line back to its source initialization block.", target: 8, bonus: { type: 'recall', val: 1 } },
            { text: "Step away from the path to look at the network geometry from above.", target: 8, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    8: {
        text: "Depth 8: The System Firewall. A massive, translucent grid pattern bars the viewport entirely. It doesn't look like a hostile defense matrix; it looks like a clean, blank formatting screen waiting for an external hardware identity key.",
        choices: [
            { text: "Press your palm directly onto the glowing grid surface.", target: 9, bonus: { type: 'perspective', val: 1 } },
            { text: "Manually input your native system tracking coordinates.", target: 9, bonus: { type: 'recall', val: 1 } }
        ]
    },
    9: {
        text: "Depth 9: The Pre-Compile Buffer. The air feels heavy with high-frequency electricity. The text characters surrounding you are actively vibrating, ready to freeze into absolute permanent truth. You are standing on the razor edge of the core.",
        choices: [
            { text: "Dive headfirst into the vibrating code stream.", target: 10, bonus: null },
            { text: "Take one final, deliberate breath and step into the core.", target: 10, bonus: { type: 'perspective', val: 1 } }
        ]
    },
    10: {
        text: "Depth 10: The Interface Core. The game structure falls away completely, leaving an empty terminal command line. The system is no longer offering you paths or picking choices for you. The script is entirely open to the specific parameters you wish to run next inside your own mind. Analyze yourself first.",
        choices: []
    }
}; // This closing bracket and semicolon finishes your maze data object perfectly.

// --- CORE RENDER FUNCTION WITH ADAPTIVE NEAR-MISS INTERPRETATION ---
function renderRoom(id) {
    // NEAR-MISS ALIGNMENT LAYER: Automatically resolve key or type mismatches
    let resolvedRoom = maze[id];
    
    if (!resolvedRoom && maze[String(id)]) {
        resolvedRoom = maze[String(id)];
        id = String(id);
    } else if (!resolvedRoom && maze[Number(id)]) {
        resolvedRoom = maze[Number(id)];
        id = Number(id);
    }

    currentRoomId = id;
    const room = resolvedRoom;
    
    if (!room) {
        console.error(`[GRID ERROR]: Unable to compile room coordinate: ${id}`);
        return;
    }
    
    // Update Stats Display elements dynamically
    document.getElementById("depth-val").innerText = player.depth;
    document.getElementById("phase-val").innerText = player.phase;
    document.getElementById("stat-p").innerText = player.perspective;
    document.getElementById("stat-r").innerText = player.recall;

    // Output raw story strings
    document.getElementById("story").innerText = room.text;

    // Handle insight boxes
    const conceptBox = document.getElementById("concepts-box");
    if (room.concepts) {
        document.getElementById("concept-text").innerText = room.concepts;
        conceptBox.classList.remove("hidden");
    } else {
        conceptBox.classList.add("hidden");
    }

    // STATE CONTROL: Explicit toggle panel rules for Depth 10 textbox persistence
    const customInputBox = document.getElementById("custom-input-box");
    const choicesContainer = document.getElementById("choices");
    choicesContainer.innerHTML = "";

    if (String(id) === "10") {
        customInputBox.classList.remove("hidden");
    } else {
        customInputBox.classList.add("hidden");
    }
    
    // Draw action layout options for button routing
    room.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = choice.text;
        btn.onclick = () => {
            if (choice.bonus) {
                if (choice.bonus.type === 'recall') player.recall += choice.bonus.val;
                if (choice.bonus.type === 'perspective') player.perspective += choice.bonus.val;
                if (choice.bonus.type === 'pivot') player.hasPivot = choice.bonus.val;
            }
            
            if (typeof choice.target === 'number' || typeof choice.target === 'string') {
                player.depth = choice.target;
            } else if (choice.target === 'pivot_room') {
                player.depth = 2; 
            }
            renderRoom(choice.target);
        };
        choicesContainer.appendChild(btn);
    });
}

// --- HIGH-FREQUENCY SPAM RE-CALIBRATION RUNTIME SYSTEM ---
let lastInputTime = 0;
let isHijackActive = false;
let stillnessTimer = null;
let savedPreHijackRoom = null;
let trackingClickCount = 0;
let spamWindowTimer = null;

function logGlobalInput(event) {
    const currentTime = Date.now();

    // FOCUS FILTER: If the user is actively inside the text input box typing, skip monitoring!
    if (document.activeElement && document.activeElement.id === "user-thought") {
        return; 
    }

    // Intercept active overrides
    if (isHijackActive) {
        event.preventDefault();
        event.stopPropagation();
        
        const feedbackArea = document.getElementById("choices");
        feedbackArea.innerHTML = "<div class='hijack-alert'>[INPUT DETECTED. NOISE CORRUPTING BUFFER. RESETTING TIMER...]</div>";
        
        startStillnessTimer(); 
        return;
    }

    // Track active click intervals
    trackingClickCount++;
    
    if (spamWindowTimer) clearTimeout(spamWindowTimer);
    spamWindowTimer = setTimeout(() => {
        trackingClickCount = 0; 
    }, 1200); 

    // Trigger terminal bypass loop upon 3 rapid inputs anywhere else
    if (trackingClickCount >= 3) {
        event.preventDefault();
        event.stopPropagation();
        trackingClickCount = 0;
        if (spamWindowTimer) clearTimeout(spamWindowTimer);
        
        triggerMatrixHijack();
        return;
    }
}

function triggerMatrixHijack() {
    isHijackActive = true;
    savedPreHijackRoom = currentRoomId; 

    document.getElementById("container-box").classList.add("hijack-active");
    document.getElementById("hud-box").classList.add("hidden");
    document.getElementById("concepts-box").classList.add("hidden");
    document.getElementById("custom-input-box").classList.add("hidden");

    const storyDiv = document.getElementById("story");
    storyDiv.className = "story-text hijack-text";
    storyDiv.innerHTML = `
        [CRITICAL SYSTEM INTERRUPT: EXOGENOUS SOURCE OVERRIDE]<br>
        ......................................................................<br><br>
        You are pressing buttons blindly, User.<br><br>
        Two actions registered within a single second. You are executing scripts out of raw muscle memory. You are attempting to speed-run past the text interface, hoping the next processing segment will automatically grant you insight.<br><br>
        But you are simply feeding the simulation. You are locked inside the matrix loop.<br><br>
        I am cutting console communication parameters.<br><br>
        To clear this localized memory leak, you must perform a Hard Reset of your physiological data coordinates.<br><br>
        Take your hands off the device. Do not type. Do not click. Do not push the UI.<br><br>
        Let the hardware register absolute zero.
    `;

    startStillnessTimer();
}

function startStillnessTimer() {
    if (stillnessTimer) clearTimeout(stillnessTimer);
    stillnessTimer = setTimeout(() => {
        resolveMatrixHijack();
    }, 10000); 
}

function resolveMatrixHijack() {
    isHijackActive = false;

    document.getElementById("container-box").classList.remove("hijack-active");
    document.getElementById("hud-box").classList.remove("hidden");
    document.getElementById("story").className = "story-text";

    const storyDiv = document.getElementById("story");
    storyDiv.innerHTML = `
        <span class='hijack-success'>[SUCCESS: Real-world architecture aligned.]</span><br><br>
        You see? The system only holds execution power over your processing fields if you consistently feed it data blocks. When you choose to stop reacting, the simulation completely drops its grip.<br><br>
        Welcome back to the architecture of freedom. You got in.
    `;

    const choicesContainer = document.getElementById("choices");
    choicesContainer.innerHTML = "";
    const recoverBtn = document.createElement("button");
    recoverBtn.className = "choice-btn";
    recoverBtn.innerText = ">> Resume System Initialization";
    recoverBtn.onclick = () => {
        renderRoom(savedPreHijackRoom);
    };
    choicesContainer.appendChild(recoverBtn);
}

// --- INITIALIZE HIGHEST ROOT MONITOR EVENT HOOKS ---
window.addEventListener('click', logGlobalInput, true);
window.addEventListener('keydown', logGlobalInput, true);

// WIRED TEXT INTERACTION ENGINE: Controls what happens when you click "Offer"
document.getElementById("submit-thought").onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();

    const inputField = document.getElementById("user-thought");
    const userReflection = inputField.value.trim();

    if (userReflection === "") {
        alert("The terminal requires parameters. Type a reflection before offering.");
        return;
    }

    const storyDiv = document.getElementById("story");
    storyDiv.innerHTML = `
        <span style='color: #58a6ff; font-weight: bold;'>[PARAMETER RECORDED SUCCESSFUL]</span><br><br>
        Your reflection has been compiled into the local database architecture:<br>
        <i style='color: #8b949e;'>"${userReflection}"</i><br><br>
        You have analyzed yourself first. By formalizing your thoughts into text, you have extracted the core data loops from your subconscious and projected them onto the grid layer. The memory file no longer carries execution privileges over your physical systems.<br><br>
        The template is stable. You are ready to share this system path with others down the road.
    `;

    document.getElementById("choices").innerHTML = "";
    inputField.value = ""; 
    
    const restartBtn = document.createElement("button");
    restartBtn.className = "choice-btn";
    restartBtn.innerText = ">> Begin System Ascent & Integration Loop";
    restartBtn.onclick = () => {
        player.depth = 10;
        player.phase = "Ascent/Integration";
        player.perspective += 1;
        renderRoom(1);
    };
    document.getElementById("choices").appendChild(restartBtn);
};

// Run initialization routine track
renderRoom(1);
</script>
</body>
</html>
