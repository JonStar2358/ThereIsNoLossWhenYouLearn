<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Maze of No Loss</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .game-container { 
            max-width: 650px; 
            width: 100%; 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 6px; 
            padding: 24px; 
            box-shadow: 0 8px 24px 
                rgba(0,0,0,0.5); 
            box-sizing: border-box; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        .hud { 
            display: flex; 
            justify-content: 
                space-between; 
            border-bottom: 1px 
                solid #30363d; 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
            font-size: 0.9rem; 
            color: #8b949e; 
        }
        .hud strong { color: #58a6ff; }
        .story-text { 
            line-height: 1.6; 
            margin-bottom: 24px; 
            font-size: 1.1rem; 
            height: auto; 
        }
        .concepts-panel { 
            background: 
                rgba(88,166,255,0.1); 
            border-left: 4px 
                solid #58a6ff; 
            padding: 12px; 
            margin-bottom: 24px; 
            font-size: 0.95rem; 
        }
        .choices-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .choice-btn { 
            background: #21262d; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 12px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem; 
            white-space: normal; 
            word-wrap: break-word; 
            opacity: 0; 
            animation: fadeIn 0.3s 
                forwards; 
            transition: all 0.2s; 
        }
        .choice-btn:hover { 
            background: #30363d; 
            transform: translateX(4px); 
        }
        .input-container { 
            margin-top: 20px; 
            border-top: 1px 
                dashed #30363d; 
            padding-top: 20px; 
            display: flex; 
            gap: 10px; 
            opacity: 0; 
            animation: fadeIn 0.3s 
                forwards; 
        }
        .text-input { 
            flex-grow: 1; 
            background: #0d1117; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 1rem; 
        }
        .text-input:focus { 
            border-color: #58a6ff; 
            outline: none; 
        }
        .submit-btn { 
            background: #21262d; 
            color: #58a6ff; 
            border: 1px solid #30363d; 
            padding: 10px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem; 
        }
        .submit-btn:hover { 
            background: #30363d; 
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hud">
        <span>Depth: <strong 
        id="depth-val">1</strong> 
        (<span id="phase-val"
        >Descent</span>)</span>
        <span>Perspective: <strong 
        id="stat-p">1</strong> 
        | Recall: <strong 
        id="stat-r">1</strong></span>
    </div>
    <div id="story" 
         class="story-text"></div>
    <div id="concepts-box" 
         class="concepts-panel hidden">
        <strong>💡 Realization:</strong> 
        <span id="concept-text"></span>
    </div>
    <div id="choices" 
         class="choices-container"></div>
    <div id="custom-input-box" 
         class="input-container hidden">
        <input type="text" 
               id="user-thought" 
               class="text-input" 
               placeholder="Type text...">
        <button id="submit-thought" 
                class="submit-btn"
                >Offer</button>
    </div>
</div>
<script>
const player = { 
    depth: 1, 
    phase: "Descent", 
    perspective: 1, 
    recall: 1, 
    hasPivot: false 
};
let typingTimer = null;
const maze = {  1: { 
        text: "Depth 1: The Void of " +
              "First Assumptions. You " +
              "stand on a plain of " +
              "pure white light. Three " +
              "distinct structures frame " +
              "the path ahead. There " +
              "are no signs, only the " +
              "shapes of your intentions.", 
        choices: [
            { text: "Enter the obsidian archway.", 
              target: 2, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Step into the liquid mercury.", 
              target: 'pivot_room', 
              bonus: null }, 
            { text: "Pass through the blank gap.", 
              target: 2, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    'pivot_room': { 
        text: "Depth 2 (Shifted): The " +
              "uncertainty wraps around " +
              "you. Instead of failing " +
              "or resetting, your focus " +
              "sharpens to look for " +
              "fundamental patterns. " +
              "You have lost nothing. " +
              "You have simply adapted.", 
        concepts: "The Observer's Pivot " +
                  "(Failure alters coordinates).", 
        choices: [{ text: "Integrate this truth " +
                          "and continue downward.", 
                    target: 2, 
                    bonus: { type: 'pivot', val: true } }] 
    },
    2: { 
        text: "Depth 2: The Hall of " +
              "Fractured Mirrors. The " +
              "walls reflect your past " +
              "choices. A faint inscription " +
              "reads: 'The version of " +
              "you that stumbled taught " +
              "the version of you standing here.'", 
        choices: [
            { text: "Examine your largest reflection.", 
              target: 3, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Step through the glass rhythm.", 
              target: 3, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    3: { 
        text: "Depth 3: The Library of " +
              "Unwritten Laws. Slips of " +
              "drifting paper hold rules " +
              "given to you by society. " +
              "One reads: 'You must always " +
              "know the outcome before you try.'", 
        choices: [
            { text: "Sit and study the papers.", 
              target: 4, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Push through a solid bookshelf.", 
              target: 4, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    4: { 
        text: "Depth 4: The Monolith of " +
              "Weightless Matter. The " +
              "scenery thickens. You stand " +
              "before a massive boulder " +
              "suspended over an infinite " +
              "starless abyss. It bars the " +
              "path entirely, pulsing with " +
              "gravity. It is too heavy for " +
              "human muscle, yet hangs " +
              "unanchored. To pass, you " +
              "must interact with something " +
              "that refuses to acknowledge " +
              "your physical constraints.", 
        choices: [
            { text: "Lean your weight into stone.", 
              target: 5, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Float up and phase through it.", 
              target: 'trap_room', 
              bonus: null }
        ] 
    },
    'trap_room': { 
        text: "The stone rejects your phasing. " +
              "It feels cold against your skin, " +
              "guiding your hands safely to " +
              "crevices. The friction doesn't " +
              "crush you; it shifts your footing. " +
              "You climb. As you sit upon the " +
              "summit of the mass that blocked " +
              "you, you see the stone is now " +
              "beneath you—weightless, discarded, " +
              "and serving as your vessel.", 
        choices: [{ text: "Acknowledge that friction " +
                          "became your path.", 
                    target: 5, 
                    bonus: { type: 'perspective', val: 2 } }] 
    },
    5: { 
        text: "Depth 5: The Market of " +
              "Identity. Transparent figures " +
              "wander between stalls, buying " +
              "intangible goods like 'The Need " +
              "to be Right' and 'The Comfort " +
              "of Being a Victim.' A merchant " +
              "approaches you, offering a map " +
              "deeper in exchange for a piece " +
              "of your progress. You look at " +
              "the stalls and recognize the " +
              "cheap costumes for what they are.", 
        choices: [
            { text: "Offer the merchant everything.", 
              target: 6, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Walk past in total silence.", 
              target: 6, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    'market_discard': { 
        text: "The merchant blinks at your words. " +
              "He rolls them in his translucent " +
              "hand, chuckles at the absurdity, " +
              "and drops them into a basket of " +
              "discarded concepts. 'An interesting " +
              "phrase,' he says, 'but you cannot " +
              "buy or sell what isn't solid.' " +
              "The market shifts under your feet, " +
              "carrying you forward.", 
        choices: [{ text: "Continue into deep corridors.", 
                    target: 6 }] 
    },
    'market_secret': { 
        text: "The moment you whisper that concept, " +
              "the transparent merchants freeze. " +
              "The stalls crack like porcelain. " +
              "By offering a concept that " +
              "addresses the true reality of " +
              "identity, you short-circuit the " +
              "pricing grid. Space collapses.", 
        choices: [{ text: "Step through the shattered " +
                          "market floor.", 
                    target: 6, 
                    bonus: { type: 'perspective', val: 2 } }] 
    },
    'quantum_synthesis': { 
        text: "Simultaneous Presence Active: " +
              "By typing fragments of both " +
              "choices together, your intuition " +
              "bridges parallel paths. Your " +
              "focus stretches across distinct " +
              "possibilities at once, realizing " +
              "space and choices are constructs. " +
              "You absorb the insight of both " +
              "tracks simultaneously.", 
        choices: [{ text: "Re-unify your awareness.", 
                    target: null }] 
    },6: { 
        text: "Depth 6: The Whispering " +
              "Gallery. The walls are curved " +
              "out of polished bone, echoing " +
              "every self-critical thought " +
              "you have ever had. The volume " +
              "is deafening, turning internal " +
              "doubts into literal architecture.", 
        choices: [
            { text: "Listen intently for the source.", 
              target: 7, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Sing a dissonant note to shatter it.", 
              target: 7, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    7: { 
        text: "Depth 7: The Clockwork " +
              "Horizon. Massive brass gears " +
              "turn slowly in the sky, grinding " +
              "out the illusion of passing time. " +
              "A sign reads: 'You are running out " +
              "of chances.' The weight of time " +
              "tries to induce sudden panic.", 
        choices: [
            { text: "Match your stride to gears.", 
              target: 8, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Sit down on a cog and wait.", 
              target: 8, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    8: { 
        text: "Depth 8: The Threshold of " +
              "Scarcity. You enter a room " +
              "where resources appear to shrink " +
              "with every breath. The walls are " +
              "closing in, designed to force " +
              "you to hoard what you have.", 
        choices: [
            { text: "Examine seams of closing walls.", 
              target: 9, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Abandon luggage at doorway.", 
              target: 9, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    9: { 
        text: "Depth 9: The Guardian of " +
              "the Gate. A perfect mirror image " +
              "of yourself blocks the path. It " +
              "looks at you with deep fatigue. " +
              "'If you enter the core, you must " +
              "turn around and walk back out to " +
              "teach others. Ready for the burden?'", 
        choices: [
            { text: "Embrace reflection, acknowledging fear.", 
              target: 10, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Say truth is not a chore.", 
              target: 10, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    10: { 
        text: "Depth 10: The Core Engine. " +
              "You have reached the center. " +
              "The white light returns, total. " +
              "You realize there is no loss " +
              "when you learn. Every mistake " +
              "was a coordinate shift. Your cup " +
              "is full. Now, carry it back out.", 
        choices: [{ text: "Touch center for Ascent.", 
                    target: 99, 
                    phaseChange: "Ascent" }] 
    },
    99: { 
        text: "Depth 10 (Ascending): The " +
              "Core fades. The maze tests " +
              "whether you can hold clarity " +
              "while moving backward into old, " +
              "familiar structural patterns.", 
        choices: [{ text: "Step backward into shadows.", 
                    target: 98 }] 
    },
    98: { 
        text: "Depth 9 (Ascending): The " +
              "Hall of the Addictive Loop. " +
              "Flashing neon signs offer " +
              "cheap validation, trying to " +
              "trap you in an endless grind.", 
        getDynamicChoices: function() { 
            let options = [{ text: "Engage with blinking loops.", 
                             target: 'loop_trap' }]; 
            if (player.hasPivot) { 
                options.push({ text: "Pivot the parameters.", 
                               target: 97 }); 
            } else { 
                options.push({ text: "Search for alternative path.", 
                               target: 97 }); 
            } 
            return options; 
        } 
    },
    'loop_trap': { 
        text: "The loop captures attention. " +
              "In an ordinary system, this " +
              "is an addictive trap. Here, " +
              "experiencing it firsthand provides " +
              "clean data. You map it fully.", 
        choices: [{ text: "Use new data to bypass machine.", 
                    target: 97, 
                    bonus: { type: 'perspective', val: 1 } }] 
    },
    97: { 
        text: "Depth 8 (Ascending): The " +
              "Valley of Collective Grief. " +
              "You feel the weight of sorrow—" +
              "the regret of everyone who " +
              "believes they wasted their lives. " +
              "The heavy air pulls you down.", 
        choices: [
            { text: "Project a structural map.", 
              target: 96, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Let grief pass through you.", 
              target: 96, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    96: { 
        text: "Depth 7 (Ascending): The " +
              "Echo Chamber. Your old self-doubts " +
              "call out from dark, mimicking " +
              "voices from your past. They claim " +
              "your awakening is an illusion.", 
        choices: [
            { text: "Listen without reacting, dissolving text.", 
              target: 95, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Walk directly toward noise.", 
              target: 95, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    95: { 
        text: "Depth 6 (Ascending): The " +
              "Shifting Gearway. Clockwork turns " +
              "backward. The teeth try to lock " +
              "you into old timelines and past " +
              "versions of your identity.", 
        choices: [
            { text: "Step precisely between teeth.", 
              target: 94, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Force gears to stop by freezing.", 
              target: 94, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },94: { 
        text: "Depth 5 (Ascending): The Ghost " +
              "Market. The merchants offer " +
              "you your old identity back. " +
              "They promise comfort, safety, " +
              "and a predictable life if " +
              "you just agree to put the " +
              "old costume back on your skin.", 
        choices: [
            { text: "Declined. Walk past stalls.", 
              target: 93, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Laugh out loud at the trade.", 
              target: 93, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    93: { 
        text: "Depth 4 (Ascending): The " +
              "Remnant Stone. The massive " +
              "boulder you climbed earlier " +
              "is still here, but it has " +
              "begun to crack. It is losing " +
              "its density because you no " +
              "longer believe in its weight.", 
        choices: [
            { text: "Push through fracturing debris.", 
              target: 92, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Leap off the peak into fog.", 
              target: 92, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    92: { 
        text: "Depth 3 (Ascending): The " +
              "Blank Library. The drifting " +
              "papers are now empty. The " +
              "unwritten laws have lost " +
              "their print. You must write " +
              "your own rules onto pages.", 
        choices: [
            { text: "Leave pages blank and walk.", 
              target: 91, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Inscribe a single word: Reality.", 
              target: 91, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    91: { 
        text: "Depth 2 (Ascending): The " +
              "Clearing Mirrors. The fractured " +
              "glass now reflects pure light " +
              "rather than regrets. The " +
              "maze is thinning out. The " +
              "horizon is finally near.", 
        choices: [{ text: "Step through the framework.", 
                    target: 90, 
                    bonus: { type: 'recall', val: 1 } }] 
    },
    90: { 
        text: "Depth 1 (Ascending): The " +
              "Final Gate. You stand back " +
              "at the white horizon. An " +
              "inscription asks: 'You return " +
              "to a world that lives in " +
              "fear of loss. How will you " +
              "show them this maze layout?'", 
        choices: [
            { text: "By constructing a hidden loop.", 
              target: 1, reset: true }, 
            { text: "By living without attachments.", 
              target: 1, reset: true }
        ] 
    }
};

function executeChoiceLogic(c) {
    if (c.bonus) {
        if (c.bonus.type === 'perspective') 
            player.perspective += c.bonus.val;
        if (c.bonus.type === 'recall') 
            player.recall += c.bonus.val;
        if (c.bonus.type === 'pivot') 
            player.hasPivot = true;
    }
    if (c.phaseChange) player.phase = c.phaseChange;
    if (c.reset) {
        player.depth = 1; player.phase = "Descent"; 
        player.perspective = 1; player.recall = 1; 
        player.hasPivot = false;
    } else {
        player.depth = c.target;
    }
}

function handleCustomInput() {
    const f = document.getElementById("user-thought");
    const v = f.value.trim().toLowerCase();
    if (!v) return;
    f.value = "";

    const r = maze[player.depth];
    const rc = r.getDynamicChoices ? 
        r.getDynamicChoices() : r.choices;

    if (player.depth === 5) {
        if (["nothing", "nobody", "illusion", 
             "peace", "zen", "void"].includes(v)) {
            player.depth = 'market_secret'; 
            renderGame(); 
            return;
        }
    }

    if (player.hasPivot && rc && rc.length > 1 && 
        player.depth !== 'quantum_synthesis') {
        let m = [];
        rc.forEach(c => {
            const w = c.text.toLowerCase()
                .replace(/[^a-z0-9 ]/g, "").split(" ");
            if (w.some(word => word.length > 3 && 
                v.includes(word))) m.push(c);
        });

        if (m.length >= 2) {
            executeChoiceLogic(m[0]);
            executeChoiceLogic(m[1]);
            
            let t = m[1].target;
            if (typeof m[0].target === 'number' && 
                typeof m[1].target === 'number') {
                t = Math.max(m[0].target, m[1].target);
            }
            
            maze['quantum_synthesis'].choices[0].target = t;
            player.depth = 'quantum_synthesis';
            renderGame();
            return;
        }
    }

    if (player.depth === 5) {
        player.depth = 'market_discard';
        renderGame();
    }
}

document.getElementById("submit-thought")
    .addEventListener("click", handleCustomInput);
document.getElementById("user-thought")
    .addEventListener("keypress", (e) => { 
        if (e.key === "Enter") handleCustomInput(); 
    });

function typeWriter(t, eId, s, cb) {
    let i = 0; 
    const e = document.getElementById(eId); 
    e.textContent = ""; 
    clearInterval(typingTimer);
    typingTimer = setInterval(() => { 
        if (i < t.length) { 
            e.textContent += t.charAt(i); 
            i++; 
        } else { 
            clearInterval(typingTimer); 
            if (cb) cb(); 
        } 
    }, s);
}

function renderGame() {
    let d = player.depth;
    if (player.phase === "Ascent") {
        if (player.depth === 99) d = 10;
        else if (player.depth >= 90) d = player.depth - 90;
    } else if (player.depth === 'market_secret' || 
               player.depth === 'market_discard') {
        d = 5;
    } else if (player.depth === 'quantum_synthesis') {
        d = "🌀";
    }
    
    document.getElementById("depth-val").textContent = d;
    document.getElementById("phase-val").textContent = player.phase;
    document.getElementById("stat-p").textContent = player.perspective;
    document.getElementById("stat-r").textContent = player.recall;

    const r = maze[player.depth];
    const cBox = document.getElementById("choices"); 
    cBox.innerHTML = "";
    
    const pane = document.getElementById("concepts-box"); 
    const t = document.getElementById("concept-text");
    const ib = document.getElementById("custom-input-box");

    if (player.hasPivot) {
        pane.classList.remove("hidden"); 
        t.textContent = "The Observer's Pivot (Active)";
        ib.classList.remove("hidden");
    } else {
        pane.classList.add("hidden");
        if (player.depth === 5) 
            ib.classList.remove("hidden"); 
        else 
            ib.classList.add("hidden");
    }

    typeWriter(r.text, "story", 12, () => {
        if (r.concepts) {
            pane.classList.remove("hidden"); 
            t.textContent = r.concepts;
        }
        
        const rc = r.getDynamicChoices ? 
            r.getDynamicChoices() : r.choices;
        if (rc) {
            rc.forEach(c => {
                const b = document.createElement("button"); 
                b.className = "choice-btn"; 
                b.textContent = c.text;
                b.addEventListener("click", () => {
                    executeChoiceLogic(c);
                    renderGame();
                });
                cBox.appendChild(b);
            });
        }
    });
}

renderGame();
</script>
</body>
</html>
