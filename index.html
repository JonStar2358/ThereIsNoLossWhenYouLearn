<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>The Maze of No Loss</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --panel-bg: #161b22;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .game-container {
            max-width: 650px;
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            box-sizing: border-box;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }
        .hud span strong { color: var(--accent-color); }
        .story-text {
            line-height: 1.6;
            margin-bottom: 24px;
            font-size: 1.1rem;
            height: auto;
        }
        .concepts-panel {
            background: rgba(88, 166, 255, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            margin-bottom: 24px;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-btn {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            white-space: normal;
        }
        .choice-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            transform: translateX(4px);
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hud">
        <span>Depth: <strong id="depth-val">1</strong> 
        (<span id="phase-val">Descent</span>)</span>
        <span>Perspective: <strong id="stat-p">1</strong> 
        | Recall: <strong id="stat-r">1</strong></span>
    </div>
    <div id="story" class="story-text"></div>
    <div id="concepts-box" class="concepts-panel hidden">
        <strong>💡 Realization Unlocked:</strong> 
        <span id="concept-text"></span>
    </div>
    <div id="choices" class="choices-container"></div>
</div>
<!-- This line links Page 1 to Page 2 -->
<script src="game.js"></script>
</body>
</html>
