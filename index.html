<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Maze of No Loss</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .game-container { 
            max-width: 650px; 
            width: 100%; 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 6px; 
            padding: 24px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
            box-sizing: border-box; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        .hud { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #30363d; 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
            font-size: 0.9rem; 
            color: #8b949e; 
        }
        .hud strong { color: #58a6ff; }
        .story-text { 
            line-height: 1.6; 
            margin-bottom: 24px; 
            font-size: 1.1rem; 
            height: auto; 
        }
        .concepts-panel { 
            background: rgba(88,166,255,0.1); 
            border-left: 4px solid #58a6ff; 
            padding: 12px; 
            margin-bottom: 24px; 
            font-size: 0.95rem; 
        }
        .choices-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .choice-btn { 
            background: #21262d; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 12px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem; 
            white-space: normal; 
            word-wrap: break-word; 
            opacity: 0; 
            animation: fadeIn 0.3s forwards; 
            transition: all 0.2s; 
        }
        .choice-btn:hover { 
            background: #30363d; 
            transform: translateX(4px); 
        }
        .input-container { 
            margin-top: 20px; 
            border-top: 1px dashed #30363d; 
            padding-top: 20px; 
            display: flex; 
            gap: 10px; 
            opacity: 0; 
            animation: fadeIn 0.3s forwards; 
        }
        .text-input { 
            flex-grow: 1; 
            background: #0d1117; 
            color: #c9d1d9; 
            border: 1px solid #30363d; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 1rem; 
        }
        .text-input:focus { border-color: #58a6ff; outline: none; }
        .submit-btn { 
            background: #21262d; 
            color: #58a6ff; 
            border: 1px solid #30363d; 
            padding: 10px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem; 
        }
        .submit-btn:hover { background: #30363d; }
        @keyframes fadeIn { to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hud">
        <span>Depth: <strong id="depth-val">1</strong> 
        (<span id="phase-val">Descent</span>)</span>
        <span>Perspective: <strong id="stat-p">1</strong> 
        | Recall: <strong id="stat-r">1</strong></span>
    </div>
    <div id="story" class="story-text"></div>
    <div id="concepts-box" class="concepts-panel hidden">
        <strong>💡 Realization Unlocked:</strong> 
        <span id="concept-text"></span>
    </div>
    <div id="choices" class="choices-container"></div>
    <div id="custom-input-box" class="input-container hidden">
        <input type="text" id="user-thought" class="text-input" 
               placeholder="Type a concept...">
        <button id="submit-thought" class="submit-btn">Offer</button>
    </div>
</div>
<script>
const player = { 
    depth: 1, phase: "Descent", perspective: 1, recall: 1, hasPivot: false 
};
let typingTimer = null;
const maze = {
    // --- DESCENT PHASE (1 to 5) ---
    1: { 
        text: "Depth 1: The Void of First Assumptions. " +
              "You stand on a plain of pure white light. " +
              "Three distinct structures frame the path ahead. " +
              "There are no signs, only your intentions.", 
        choices: [
            { text: "Enter the obsidian archway.", target: 2, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Step directly into the liquid mercury.", 
              target: 'pivot_room', bonus: null }, 
            { text: "Pass through the blank gap between them.", target: 2, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    'pivot_room': { 
        text: "Depth 2 (Shifted): The uncertainty wraps around you. " +
              "Instead of failing or resetting, your focus sharpens " +
              "to look for fundamental patterns. You have lost nothing. " +
              "You have simply adapted.", 
        concepts: "The Observer's Pivot (Failure alters coordinates).", 
        choices: [{ text: "Integrate this truth and continue downward.", 
                    target: 2, bonus: { type: 'pivot', val: true } }] 
    },
    2: { 
        text: "Depth 2: The Hall of Fractured Mirrors. " +
              "The walls reflect your past choices. A faint inscription: " +
              "'The version of you that stumbled taught the version of " +
              "you standing here.'", 
        choices: [
            { text: "Examine your largest reflection.", target: 3, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Step through the rhythm of the glass.", 
              target: 3, bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    3: { 
        text: "Depth 3: The Library of Unwritten Laws. " +
              "Slips of drifting paper hold rules given to you " +
              "by society or your own anxieties. One reads: " +
              "'You must always know the outcome before you try.'", 
        choices: [
            { text: "Sit and study the syntax of the papers.", target: 4, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Push directly through a solid wooden bookshelf.", 
              target: 4, bonus: { type: 'perspective', val: 1 } }
        ] 
    },javascript    4: { 
        text: "Depth 4: The Monolith of Weightless Matter. " +
              "Transitioning deeper, the scenery thickens. " +
              "You stand before a massive boulder suspended over an " +
              "infinite starless abyss. It bars the path entirely, " +
              "pulsing with the dense gravity of material anxiety. " +
              "It is too heavy for human muscle, yet it hangs unanchored. " +
              "To pass, you must interact with something that refuses " +
              "to acknowledge your physical constraints.", 
        choices: [
            { text: "Lean your weight into the stone.", target: 5, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Float upward, attempting to phase through it.", 
              target: 'trap_room', bonus: null }
        ] 
    },
    'trap_room': { 
        text: "The stone rejects your phasing. It feels cold against " +
              "your skin, guiding your hands safely to crevices. " +
              "The friction doesn't crush you; it shifts your footing. " +
              "You climb. As you sit upon the summit of the mass that " +
              "blocked you, you see that the stone is now beneath you—" +
              "weightless, discarded, and serving as your vessel.", 
        choices: [{ text: "Acknowledge that your friction became your path.", 
                    target: 5, bonus: { type: 'perspective', val: 2 } }] 
    },
    5: { 
        text: "Depth 5: The Market of Identity. Transparent figures " +
              "wander between stalls, buying intangible goods like " +
              "'The Need to be Right' and 'The Comfort of Being a Victim.' " +
              "A merchant approaches you, offering a map deeper in exchange " +
              "for a piece of your progress. You look at the stalls " +
              "and recognize the cheap costumes for what they are.", 
        choices: [
            { text: "Offer the merchant everything you have.", target: 6, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Walk past the stalls in total silence.", target: 6, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    'market_discard': { 
        text: "The merchant blinks at your words. He rolls them around " +
              "in his translucent hand, chuckles at the absurdity, and drops " +
              "them into a basket of discarded concepts. 'An interesting phrase,' " +
              "he says, 'but you cannot buy or sell what isn't solid.' " +
              "The market shifts slightly under your feet, carrying you forward.", 
        choices: [{ text: "Continue into the deeper corridors.", target: 6 }] 
    },
    'market_secret': { 
        text: "The moment you whisper that specific concept, the transparent " +
              "merchants freeze. The stalls begin to crack like porcelain. " +
              "By offering a concept that accurately addresses the true " +
              "reality of identity, you have short-circuited the market's " +
              "pricing grid. Space collapses.", 
        choices: [{ text: "Step cleanly through the shattered market floor.", 
                    target: 6, bonus: { type: 'perspective', val: 2 } }] 
    },
    'quantum_synthesis': { 
        text: "Simultaneous Presence Active: By typing fragments of both " +
              "choices together, your intuition bridges parallel paths. " +
              "Your focus stretches across distinct possibilities at once, " +
              "realizing space and choices are constructs. You absorb the " +
              "insight of both tracks simultaneously.", 
        choices: [{ text: "Re-unify your awareness and step deeper.", target: null }] 
    },
    // --- DESCENT PHASE (6 to 10) ---
    6: { 
        text: "Depth 6: The Whispering Gallery. The walls are curved " +
              "out of polished bone, echoing every self-critical thought " +
              "you have ever had. The volume is deafening. The sound waves " +
              "physically vibrate the stone beneath your feet, turning your " +
              "internal doubts into literal architecture.", 
        choices: [
            { text: "Listen intently to find the source of the sound.", target: 7, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Sing a completely dissonant note to shatter the echo.", target: 7, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },javascript    7: { 
        text: "Depth 7: The Clockwork Horizon. Massive, interlocking brass " +
              "gears turn slowly in the sky, grinding out the illusion of " +
              "passing time. A sign reads: 'You are running out of chances.' " +
              "The weight of time tries to induce panic, forcing you to rush " +
              "your footsteps down the corridor.", 
        choices: [
            { text: "Match your stride to the rhythm of the gears.", target: 8, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Sit down on a turning cog and wait for time to wear out.", 
              target: 8, bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    8: { 
        text: "Depth 8: The Threshold of Scarcity. You enter a room where " +
              "resources appear to shrink with every breath you take. The walls " +
              "are closing in, and a gauge on the wall tells you your capacity " +
              "is leaking away. It is a simulation designed to make you hoard.", 
        choices: [
            { text: "Examine the seams of the closing walls.", target: 9, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Voluntarily abandon your luggage at the doorway.", target: 9, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    9: { 
        text: "Depth 9: The Guardian of the Gate. A perfect mirror image " +
              "of yourself blocks the path. It looks at you with deep fatigue. " +
              "'If you enter the core,' it whispers, 'you must turn around and " +
              "walk all the way back out into the shadows to teach others.'", 
        choices: [
            { text: "Embrace the reflection, acknowledging the fear.", target: 10, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Tell the reflection that truth is not a chore.", target: 10, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    10: { 
        text: "Depth 10: The Core Engine. You have reached the center of " +
              "the labyrinth. The white light returns, blinding and total. " +
              "You experience the absolute realization that there is no loss " +
              "when you learn. Every mistake was just a coordinate shift. " +
              "Your cup is full. Now, turn around and carry it back out.", 
        choices: [{ text: "Touch the center and accept your Ascent.", 
                    target: 99, phaseChange: "Ascent" }] 
    },
    // --- ASCENT PHASE (10 down to 1) ---
    99: { 
        text: "Depth 10 (Ascending): The Core fades behind you. " +
              "The structure begins to twist. The maze is testing whether " +
              "you can hold onto your clarity while moving backward into old, " +
              "familiar patterns.", 
        choices: [{ text: "Step backward into the emerging shadows.", target: 98 }] 
    },
    98: { 
        text: "Depth 9 (Ascending): The Hall of the Addictive Loop. " +
              "Flashing neon signs offer cheap validation and minor numbers, " +
              "trying to trap you in an endless, comfortable grind.", 
        getDynamicChoices: function() { 
            let options = [{ text: "Engage with the blinking loops.", target: 'loop_trap' }]; 
            if (player.hasPivot) { 
                options.push({ text: "Utilize your insight to pivot parameters.", target: 97 }); 
            } else { 
                options.push({ text: "Search for an alternative output path.", target: 97 }); 
            } 
            return options; 
        } 
    },
    'loop_trap': { 
        text: "The loop captures your attention. In an ordinary system, " +
              "this is an addictive trap. Here, experiencing the loop " +
              "firsthand provides clean spatial data. You map it.", 
        choices: [{ text: "Use the new data to bypass the machine.", 
                    target: 97, bonus: { type: 'perspective', val: 1 } }] 
    },
    97: { 
        text: "Depth 8 (Ascending): The Valley of Collective Grief. " +
              "You feel the crushing weight of human sorrow—the regret of " +
              "everyone who believes they wasted their lives. " +
              "The air is heavy, pulling you to your knees.", 
        choices: [
            { text: "Project a structural map in the sky.", target: 96, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Sit in the dust and let the grief pass through.", target: 96, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    96: { 
        text: "Depth 7 (Ascending): The Echo Chamber. Your old " +
              "self-doubts call out from the dark, mimicking the voices " +
              "of people from your past. They tell you that your awakening " +
              "is an illusion.", 
        choices: [
            { text: "Listen without reacting, letting the voices dissolve.", target: 95, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Walk directly toward the source of the noise.", target: 95, 
              bonus: { type: 'recall', val: 1 } }
        ] javascript    95: { 
        text: "Depth 6 (Ascending): The Shifting Gearway. The clockwork " +
              "mechanism from your descent is turning backward. The teeth of " +
              "the gears try to lock you into old timelines and past versions.", 
        choices: [
            { text: "Step precisely between the moving teeth.", target: 94, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Force the gears to stop by refusing to move.", target: 94, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    },javascript    94: { 
        text: "Depth 5 (Ascending): The Ghost Market. The merchants " +
              "offer you your old identity back. They promise comfort, safety, " +
              "and a predictable life if you just agree to put the old costume on.", 
        choices: [
            { text: "Declined. Walk past the stalls without looking back.", target: 93, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Laugh out loud at the absurdity of the trade.", target: 93, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    93: { 
        text: "Depth 4 (Ascending): The Remnant Stone. The massive " +
              "boulder you climbed earlier is still here, but it has begun " +
              "to crack. It is losing its density because you no longer believe.", 
        choices: [
            { text: "Push through the fracturing debris.", target: 92, 
              bonus: { type: 'recall', val: 1 } }, 
            { text: "Leap directly off the peak into the white fog.", target: 92, 
              bonus: { type: 'perspective', val: 1 } }
        ] 
    },
    92: { 
        text: "Depth 3 (Ascending): The Blank Library. The drifting " +
              "papers are now completely empty. The unwritten laws have lost " +
              "their print. You must write your own rules onto the pages.", 
        choices: [
            { text: "Leave the pages blank and walk through.", target: 91, 
              bonus: { type: 'perspective', val: 1 } }, 
            { text: "Inscribe a single word: Reality.", target: 91, 
              bonus: { type: 'recall', val: 1 } }
        ] 
    },
    91: { 
        text: "Depth 2 (Ascending): The Clearing Mirrors. The fractured " +
              "glass now reflects the pure light of the core rather than your " +
              "past regrets. The maze is thinning out. The horizon is near.", 
        choices: [{ text: "Step through the silver framework.", target: 90, 
                    bonus: { type: 'recall', val: 1 } }] 
    },
    90: { 
        text: "Depth 1 (Ascending): The Final Gate. You stand back at " +
              "the white horizon. An inscription asks: 'You return to a " +
              "world that lives in fear of loss. How will you show them?'", 
        choices: [
            { text: "By constructing a hidden loop of choices for them to play.", 
              target: 1, reset: true }, 
            { text: "By living without attachments as a statement.", target: 1, reset: true }
        ] 
    }
};

function executeChoiceLogic(c) {
    if (c.bonus) {
        if (c.bonus.type === 'perspective') player.perspective += c.bonus.val;
        if (c.bonus.type === 'recall') player.recall += c.bonus.val;
        if (c.bonus.type === 'pivot') player.hasPivot = true;
    }
    if (c.phaseChange) player.phase = c.phaseChange;
    if (c.reset) {
        player.depth = 1; player.phase = "Descent"; 
        player.perspective = 1; player.recall = 1; player.hasPivot = false;
    } else {
        player.depth = c.target;
    }
}

function handleCustomInput() {
    const f = document.getElementById("user-thought");
    const v = f.value.trim().toLowerCase();
    if (!v) return;
    f.value = "";

    const r = maze[player.depth];
    const rc = r.getDynamicChoices ? r.getDynamicChoices() : r.choices;

    if (player.depth === 5) {
        if (["nothing", "nobody", "illusion", "peace", "zen", "void"].includes(v)) {
            player.depth = 'market_secret'; 
            renderGame(); 
            return;
        }
    }

    if (player.hasPivot && rc && rc.length > 1 && player.depth !== 'quantum_synthesis') {
        let m = [];
        rc.forEach(c => {
            const w = c.text.toLowerCase().replace(/[^a-z0-9 ]/g, "").split(" ");
            if (w.some(word => word.length > 3 && v.includes(word))) m.push(c);
        });

        if (m.length >= 2) {
            executeChoiceLogic(m);
            executeChoiceLogic(m);
            
            let t = m.target;
            if (typeof m.target === 'number' && typeof m.target === 'number') {
                t = Math.max(m.target, m.target);
            }
            
            maze['quantum_synthesis'].choices.target = t;
            player.depth = 'quantum_synthesis';
            renderGame();
            return;
        }
    }

    if (player.depth === 5) {
        player.depth = 'market_discard';
        renderGame();
    }
}

document.getElementById("submit-thought").addEventListener("click", handleCustomInput);
document.getElementById("user-thought").addEventListener("keypress", (e) => { 
    if (e.key === "Enter") handleCustomInput(); 
});

function typeWriter(t, eId, s, cb) {
    let i = 0; 
    const e = document.getElementById(eId); 
    e.textContent = ""; 
    clearInterval(typingTimer);
    typingTimer = setInterval(() => { 
        if (i < t.length) { 
            e.textContent += t.charAt(i); 
            i++; 
        } else { 
            clearInterval(typingTimer); 
            if (cb) cb(); 
        } 
    }, s);
}

function renderGame() {
    let d = player.depth;
    if (player.phase === "Ascent") {
        if (player.depth === 99) d = 10;
        else if (player.depth >= 90) d = player.depth - 90;
    } else if (player.depth === 'market_secret' || player.depth === 'market_discard') {
        d = 5;
    } else if (player.depth === 'quantum_synthesis') {
        d = "🌀";
    }
    
    document.getElementById("depth-val").textContent = d;
    document.getElementById("phase-val").textContent = player.phase;
    document.getElementById("stat-p").textContent = player.perspective;
    document.getElementById("stat-r").textContent = player.recall;

    const r = maze[player.depth];
    const cBox = document.getElementById("choices"); 
    cBox.innerHTML = "";
    
    const pane = document.getElementById("concepts-box"); 
    const t = document.getElementById("concept-text");
    const ib = document.getElementById("custom-input-box");

    if (player.hasPivot) {
        pane.classList.remove("hidden"); 
        t.textContent = "The Observer's Pivot (Active)";
        ib.classList.remove("hidden");
    } else {
        pane.classList.add("hidden");
        if (player.depth === 5) ib.classList.remove("hidden"); else ib.classList.add("hidden");
    }

    typeWriter(r.text, "story", 12, () => {
        if (r.concepts) {
            pane.classList.remove("hidden"); 
            t.textContent = r.concepts;
        }
        
        const rc = r.getDynamicChoices ? r.getDynamicChoices() : r.choices;
        if (rc) {
            rc.forEach(c => {
                const b = document.createElement("button"); 
                b.className = "choice-btn"; 
                b.textContent = c.text;
                b.addEventListener("click", () => {
                    executeChoiceLogic(c);
                    renderGame();
                });
                cBox.appendChild(b);
            });
        }
    });
}

renderGame();
</script>
</body>
</html>
